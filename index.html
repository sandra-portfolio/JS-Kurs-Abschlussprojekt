<!DOCTYPE html>
<html lang="de">
    <head>
	    <meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta http-equiv="X-UA-Compatible" content="ie=edge">
		<title>Datensammlung Bücher</title>
		<link rel="stylesheet" href="./assets/css/style.css">

		<script src="./assets/js/elements.js" defer></script>
		<script src="./assets/js/funktionen.js" defer></script>
		<script src="./assets/js/api.js" defer></script>
		<script src="./assets/js/render.js" defer></script>
		<script src="./assets/js/theme.js" defer></script>
		<script src="./assets/js/events.js" defer></script>

		<script src="./assets/js/main.js"></script>

	</head>
	<body>

	<header class="navbar">
		<div class="navbar-inhalt">
			<h1>Meine Bibliothek</h1>

			<div class="such-container">
				<input type="text" class="such-input" placeholder="Suchen ...">
			</div>

			<div class="theme-switch-wrapper">
				<span>Dark Mode</span>
				<label class="toggle-switch">
					<input type="checkbox" id="dark-mode-toggle">
					<span class="slider"></span>
				</label>
			</div>
		</div>
	</header>

	<section class="kontroll-leiste">

		<div class="filter-group">
			<div class="filter-links">
				<button class="filter-btn aktiv" data-filter="alle">Alle</button>
				<button class="filter-btn" data-filter="gelesen">Gelesen</button>
				<button class="filter-btn" data-filter="ungelesen">Ungelesen</button>
				<button class="filter-btn toggle-btn" id="genres-toggle-btn">Genres <span class="arrow">▼</span></button>
			</div>

			<div class="genre-filter-container" id="genre-container">
				<button class="chip aktiv" data-filter="alle">Alle Genres</button>
				<button class="chip" data-filter="Liebesroman">Liebesroman</button>
				<button class="chip" data-filter="Thriller">Thriller</button>
				<button class="chip" data-filter="Manga">Manga</button>
				<button class="chip" data-filter="Fantasy">Fantasy</button>
			</div>
		</div>


		<div class="aktionen-rechts">
			<select class="sortier-select">
				<option value="titel">Sortieren: Titel (A-Z)</option>
				<option value="autor">Sortieren: Autor (A-Z)</option>
				<option value="bewertung">Sortieren: beste Bewertung</option>
			</select>

			<button class="btn-add">Buch hinzufügen</button>
		</div>

	</section>

	<main class="buecher-grid"></main>

	<!-- Modal ungelesenes Buch bewerten -->
	<div id="bewertung-modal" class="modal-overlay ausgeblendet">
		<div class="modal-content">
			<button class="modal-schliessen">✕</button>

			<h2 id="modal-buch-titel">Buch bewerten</h2>
			<p>Wie viele Sterne gibst du dem Buch?</p>

			<div class="modal-sterne" data-gewaehlte-sterne="0">
				<span class="modal-stern" data-wert="1">★</span>
				<span class="modal-stern" data-wert="2">★</span>
				<span class="modal-stern" data-wert="3">★</span>
				<span class="modal-stern" data-wert="4">★</span>
				<span class="modal-stern" data-wert="5">★</span>
			</div>

			<div class="modal-buttons">
				<button class="btn-speichern-bewertung">Bewertung speichern</button>
			</div>
		</div>
	</div>

	<!-- Modal neues Buch hinzufügen -->
	<div id="modal-hinzufuegen" class="modal-overlay ausgeblendet"> <div class="modal-content">
		<button id="modal-hinzufuegen-schliessen" class="modal-schliessen">✕</button>
		<h2>Neues Buch eintragen</h2>

		<form id="form-neues-buch">
			<div class="form-gruppe">
				<label for="input-titel">Buchtitel:</label>
				<input type="text" id="input-titel" required placeholder="z.B. Der Herr der Ringe">
			</div>

			<div class="form-gruppe">
				<label for="input-autor">Autor:</label>
				<input type="text" id="input-autor" required placeholder="z.B. J.R.R. Tolkien">
			</div>

			<div class="form-gruppe">
				<label for="input-genre">Genre:</label>
				<select id="input-genre" required>
					<option value="" disabled selected>Bitte Genre wählen...</option>
					<option value="Liebesroman">Liebesroman</option>
					<option value="Thriller">Thriller</option>
					<option value="Manga">Manga</option>
					<option value="Fantasy">Fantasy</option>
				</select>
			</div>

			<div class="form-gruppe">
				<label for="input-cover">Buchcover auswählen:</label>
				<input type="file" id="input-cover" accept="image/*" required>
			</div>

			<div class="form-gruppe checkbox-gruppe">
				<input type="checkbox" id="input-gelesen">
				<label for="input-gelesen">Ich habe dieses Buch bereits gelesen</label>
			</div>

			<div id="hinzufuegen-sterne-bereich" class="ausgeblendet">
				<p>Deine Bewertung:</p>
				<div class="sterne-container" data-gewaehlte-sterne="0">
					<span class="stern-hinzufuegen" data-wert="1">★</span>
					<span class="stern-hinzufuegen" data-wert="2">★</span>
					<span class="stern-hinzufuegen" data-wert="3">★</span>
					<span class="stern-hinzufuegen" data-wert="4">★</span>
					<span class="stern-hinzufuegen" data-wert="5">★</span>
				</div>
			</div>

			<div class="modal-buttons">
				<button type="submit" class="btn-speichern-bewertung">Buch ins Regal stellen</button>
			</div>
		</form>
	</div>
	</div>
	</body>
</html>
